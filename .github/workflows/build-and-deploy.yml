name: Build and Deploy Resume

on:
  push:
    branches: [main] # Triggers the action when you push to the main branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab your repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Compile the LaTeX file into a PDF
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_lualatex: true
          # This automatically generates resume.pdf

      # 3. Deploy everything in the root directory to Netlify
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: "."
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
